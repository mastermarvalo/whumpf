# Whumpf frontend — nginx serving the built Vite bundle as a single-page app.
#
# Same listen port as the dev server (5173) so the upstream NPM config doesn't
# have to change when toggling FRONTEND_TARGET between dev and prod.

server {
    listen 5173;
    listen [::]:5173;

    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed assets in /assets/ (e.g. index-abc123.js).
    # Cache them forever; any change produces a new filename.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Anything else (e.g. /favicon.ico, /manifest.webmanifest later) — short cache.
    location ~* \.(?:ico|png|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback. index.html is never cached so users always get the latest
    # bundle pointer on first request after a deploy.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    # gzip is cheap and these are mostly text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
